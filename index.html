<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Elektrotechnik Rechner</title>

<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
body {
  font-family: 'Inter', sans-serif;
}
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white transition">

<!-- HEADER -->
<header class="p-6 text-center relative">
  <h1 class="text-3xl font-semibold">⚡ Elektrotechnik Rechner</h1>
  
  <button onclick="toggleDark()" 
    class="absolute right-6 top-6 px-3 py-1 rounded-lg bg-gray-200 dark:bg-gray-700">
    🌙
  </button>
</header>

<!-- GRID -->
<div class="grid gap-6 p-6 md:grid-cols-2 lg:grid-cols-3 max-w-6xl mx-auto">

  <!-- CARD -->
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-5">
    
    <h2 class="text-xl font-semibold mb-3">Ohm Gesetz</h2>

    <label class="text-sm text-gray-500">Was ist gegeben?</label>
    <select id="mode" onchange="render()" 
      class="w-full mt-1 p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
      <option value="UI">Gegeben: U & I</option>
      <option value="UR">Gegeben: U & R</option>
      <option value="IR">Gegeben: I & R</option>
    </select>

    <div id="inputs" class="mt-3 space-y-3"></div>

    <div id="result" 
      class="mt-4 font-semibold text-blue-500"></div>

  </div>

</div>

<script>

// Dark Mode
function toggleDark(){
  document.body.classList.toggle("dark");
}

// Präfix
function convert(v,p){
  if(p==="µ") return v*1e-6;
  if(p==="m") return v*1e-3;
  if(p==="k") return v*1e3;
  if(p==="M") return v*1e6;
  return v;
}

// Input Feld
function field(id,label){
  return `
  <div>
    <input id="${id}" placeholder="${label}"
      oninput="calc()"
      class="w-full p-2 rounded-lg bg-gray-100 dark:bg-gray-700 shadow-inner">
    
    <select id="${id}_p" onchange="calc()"
      class="w-full mt-1 p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
      <option value="">Basis</option>
      <option value="µ">µ</option>
      <option value="m">m</option>
      <option value="k">k</option>
      <option value="M">M</option>
    </select>
  </div>`;
}

// Wert holen
function get(id){
  return convert(
    parseFloat(document.getElementById(id).value),
    document.getElementById(id+"_p").value
  );
}

// Render Inputs
function render(){
  let m=document.getElementById("mode").value;
  let h="";

  if(m==="UI"){
    h+=field("u","Spannung U (V)");
    h+=field("i","Strom I (A)");
  }

  if(m==="UR"){
    h+=field("u","Spannung U (V)");
    h+=field("r","Widerstand R (Ω)");
  }

  if(m==="IR"){
    h+=field("i","Strom I (A)");
    h+=field("r","Widerstand R (Ω)");
  }

  document.getElementById("inputs").innerHTML=h;
}

// Berechnung
function calc(){
  let m=document.getElementById("mode").value;
  let out="";

  if(m==="UI"){
    let u=get("u"), i=get("i");
    if(u && i){
      out=`R = ${(u/i).toFixed(3)} Ω<br>
           P = ${(u*i).toFixed(3)} W`;
    }
  }

  if(m==="UR"){
    let u=get("u"), r=get("r");
    if(u && r){
      let i=u/r;
      out=`I = ${i.toFixed(3)} A<br>
           P = ${(u*i).toFixed(3)} W`;
    }
  }

  if(m==="IR"){
    let i=get("i"), r=get("r");
    if(i && r){
      let u=i*r;
      out=`U = ${u.toFixed(3)} V<br>
           P = ${(u*i).toFixed(3)} W`;
    }
  }

  document.getElementById("result").innerHTML=out;
}

render();

</script>

</body>
</html>
