<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>EngiCalc Pro – Cable & Circuit Suite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { 50: '#f0f7ff', 600: '#2563eb', 900: '#1e3a8a' } } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glow-result { text-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Sidebar Fix: Verhindert das Blockieren von Klicks */
        #sidebar { 
            visibility: hidden; 
            pointer-events: none; 
            z-index: 100; 
            transition: all 0.3s ease-in-out;
        }
        #sidebar.open { 
            visibility: visible; 
            pointer-events: auto; 
            transform: translateX(0); 
        }
        
        main { position: relative; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

<div id="sidebar" class="fixed right-0 top-0 h-full w-72 bg-white dark:bg-slate-900 shadow-2xl translate-x-full p-6 border-l dark:border-slate-800">
    <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold uppercase text-xs tracking-widest text-brand-600">History</h3>
        <button onclick="toggleSidebar()" class="text-slate-400 hover:text-red-500 text-2xl">✕</button>
    </div>
    <div id="history-list" class="space-y-3 overflow-y-auto max-h-[85vh] text-[11px] font-mono">
        <p class="text-slate-400 italic">Noch keine Berechnungen...</p>
    </div>
</div>

<header class="max-w-6xl mx-auto p-6 flex justify-between items-center">
    <div class="flex items-center space-x-3">
        <div class="bg-brand-600 p-2 rounded-xl shadow-lg shadow-brand-600/20 text-white text-2xl">⚡</div>
        <h1 class="text-2xl font-black tracking-tighter uppercase italic">EngiCalc <span class="text-brand-600">Pro</span></h1>
    </div>
    <div class="flex space-x-3">
        <button onclick="toggleSidebar()" class="px-4 py-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 font-bold text-[10px] uppercase tracking-wider hover:border-brand-600 transition">📜 History</button>
        <button onclick="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-xl">🌙</button>
    </div>
</header>

<main class="max-w-7xl mx-auto p-6 grid gap-8 md:grid-cols-2 lg:grid-cols-3 items-start">
    
    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 hover:-translate-y-1 transition-all">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold text-brand-600">Cable Section</h2>
            <span class="text-[10px] bg-brand-100 dark:bg-brand-900/30 text-brand-600 px-2 py-1 rounded-md font-bold uppercase">Safety</span>
        </div>
        <code class="text-[10px] block mb-6 opacity-60">Formula: A = (2 · L · I) / (κ · ΔV_max)</code>
        
        <div class="space-y-4 mb-6">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Power / Current (Amps)</label>
                <input id="cs_i" type="number" oninput="calcCS()" placeholder="e.g. 16" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono focus:ring-brand-600 transition">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Cable Length (Meters)</label>
                <input id="cs_l" type="number" oninput="calcCS()" placeholder="e.g. 25" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono focus:ring-brand-600 transition">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Allowed Voltage Drop (%)</label>
                <input id="cs_v" type="number" oninput="calcCS()" value="3" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono focus:ring-brand-600 transition">
            </div>
        </div>

        <div class="p-4 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800">
            <span class="text-[10px] font-bold text-brand-600 uppercase block mb-1">Recommended Section</span>
            <div id="cs-res" class="text-xl font-mono font-bold glow-result">0.00 mm²</div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 hover:-translate-y-1 transition-all">
        <h2 class="text-xl font-bold text-brand-600 mb-4">Ohm's Law</h2>
        <select id="ohm_m" onchange="renderOhm()" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-bold mb-6">
            <option value="UI">Get R & P (From V, I)</option>
            <option value="UR">Get I & P (From V, R)</option>
        </select>
        <div id="ohm-inputs" class="space-y-4 mb-6"></div>
        <div class="p-4 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800">
            <div id="ohm-res" class="text-lg font-mono font-bold glow-result">Enter values...</div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 hover:-translate-y-1 transition-all">
        <h2 class="text-xl font-bold text-brand-600 mb-4">Unit Converter</h2>
        <div class="space-y-4">
            <input id="unit_in" type="number" oninput="convertUnits()" placeholder="Value..." class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono">
            <div class="grid grid-cols-2 gap-2 text-[11px] font-mono">
                <div class="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg">kilo: <span id="u_k">0</span></div>
                <div class="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg">milli: <span id="u_m">0</span></div>
                <div class="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg">micro: <span id="u_u">0</span></div>
                <div class="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg">Mega: <span id="u_M">0</span></div>
            </div>
        </div>
    </div>

</main>

<script>
    function toggleDark() { document.documentElement.classList.toggle('dark'); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    // --- CABLE SECTION LOGIC ---
    function calcCS() {
        const i = parseFloat(document.getElementById('cs_i').value) || 0;
        const l = parseFloat(document.getElementById('cs_l').value) || 0;
        const vDropPerc = parseFloat(document.getElementById('cs_v').value) || 3;
        const kappa = 56; // Copper
        const u = 230; // System Voltage
        
        if (i > 0 && l > 0) {
            const vDropAllowed = (u * vDropPerc) / 100;
            const section = (2 * l * i) / (kappa * vDropAllowed);
            document.getElementById('cs-res').innerText = section.toFixed(2) + " mm²";
            saveHistory(`Cable: ${section.toFixed(2)}mm² for ${i}A / ${l}m`);
        }
    }

    // --- OHM LOGIC ---
    function renderOhm() {
        const m = document.getElementById('ohm_m').value;
        const cont = document.getElementById('ohm-inputs');
        if(m === 'UI') {
            cont.innerHTML = `
                <input id="o_v" type="number" oninput="calcOhm()" placeholder="Voltage (V)" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono">
                <input id="o_i" type="number" oninput="calcOhm()" placeholder="Current (A)" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono">
            `;
        } else {
            cont.innerHTML = `
                <input id="o_v" type="number" oninput="calcOhm()" placeholder="Voltage (V)" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono">
                <input id="o_r" type="number" oninput="calcOhm()" placeholder="Resistance (Ω)" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono">
            `;
        }
    }

    function calcOhm() {
        const m = document.getElementById('ohm_m').value;
        const v = parseFloat(document.getElementById('o_v')?.value) || 0;
        const i = parseFloat(document.getElementById('o_i')?.value) || 0;
        const r = parseFloat(document.getElementById('o_r')?.value) || 0;
        let res = "";

        if(m === 'UI' && v && i) res = `R: ${(v/i).toFixed(2)}Ω | P: ${(v*i).toFixed(2)}W`;
        if(m === 'UR' && v && r) res = `I: ${(v/r).toFixed(2)}A | P: ${(v**2/r).toFixed(2)}W`;
        
        if(res) {
            document.getElementById('ohm-res').innerText = res;
            saveHistory("Ohm: " + res);
        }
    }

    // --- UNIT CONVERTER ---
    function convertUnits() {
        const val = parseFloat(document.getElementById('unit_in').value) || 0;
        document.getElementById('u_k').innerText = (val / 1000).toExponential(2);
        document.getElementById('u_m').innerText = (val * 1000).toFixed(2);
        document.getElementById('u_u').innerText = (val * 1000000).toFixed(0);
        document.getElementById('u_M').innerText = (val / 1000000).toExponential(2);
    }

    // --- HISTORY ---
    function saveHistory(msg) {
        let h = JSON.parse(localStorage.getItem('engi_history') || '[]');
        const entry = { t: new Date().toLocaleTimeString(), m: msg };
        if(h.length > 0 && h[0].m === msg) return;
        h.unshift(entry);
        localStorage.setItem('engi_history', JSON.stringify(h.slice(0, 15)));
        renderHistory();
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('engi_history') || '[]');
        document.getElementById('history-list').innerHTML = h.map(x => `
            <div class="p-2 border-b dark:border-slate-800">
                <span class="text-brand-600 font-bold">[${x.t}]</span><br>${x.m}
            </div>
        `).join('') || '<p class="text-slate-400 italic">Noch keine Berechnungen...</p>';
    }

    renderOhm();
    renderHistory();
</script>
</body>
</html>
