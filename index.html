<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Elektrotechnik Tool</title>

  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: 50px auto;
    }

    input, select, button {
      display: block;
      margin: 10px 0;
      padding: 8px;
      width: 100%;
    }

    .result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    .hint {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <h2>⚡ Elektrotechnik Rechner</h2>

  <p class="hint">
    Gib einfach 2 Werte ein – der dritte wird berechnet.
  </p>

  <label>Spannung (U in Volt)</label>
  <input type="number" id="u">

  <label>Strom (I in Ampere)</label>
  <input type="number" id="i">

  <label>Leistung (P in Watt)</label>
  <input type="number" id="p">

  <label>Widerstand (R in Ohm)</label>
  <input type="number" id="r">

  <button onclick="calculate()">Berechnen</button>

  <div class="result" id="output"></div>

  <script>
    function calculate() {

      let u = parseFloat(document.getElementById("u").value);
      let i = parseFloat(document.getElementById("i").value);
      let p = parseFloat(document.getElementById("p").value);
      let r = parseFloat(document.getElementById("r").value);

      let resultText = "";

      // Fall 1: P berechnen
      if (!isNaN(u) && !isNaN(i) && isNaN(p)) {
        p = u * i;
        resultText += "P = " + p.toFixed(2) + " W\n";
      }

      // Fall 2: U berechnen
      if (!isNaN(p) && !isNaN(i) && isNaN(u)) {
        u = p / i;
        resultText += "U = " + u.toFixed(2) + " V\n";
      }

      // Fall 3: I berechnen
      if (!isNaN(p) && !isNaN(u) && isNaN(i)) {
        i = p / u;
        resultText += "I = " + i.toFixed(2) + " A\n";
      }

      // Fall 4: R berechnen
      if (!isNaN(u) && !isNaN(i) && isNaN(r)) {
        r = u / i;
        resultText += "R = " + r.toFixed(2) + " Ω\n";
      }

      // Falls nichts geht
      if (resultText === "") {
        resultText = "Bitte 2 Werte eingeben (ein Feld leer lassen zum Berechnen).";
      }

      document.getElementById("output").innerText = resultText;
    }
  </script>

</body>
</html>
