<!DOCTYPE html>
<html lang="de" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <title>Elektrotechnik Rechner Pro – Engineering Tools</title>
    <meta name="description" content="Professionelle Elektrotechnik Rechner für Studium und Beruf. Ohmsches Gesetz, Leistung und Einheitenumrechnung mit modernem UI.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            600: '#2563eb', // Engineering Blue
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { backdrop-filter: blur(10px); }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

<header class="max-w-6xl mx-auto p-6 flex justify-between items-center">
    <div class="flex items-center space-x-2">
        <div class="bg-brand-600 p-2 rounded-lg shadow-lg">
            <span class="text-white text-2xl">⚡</span>
        </div>
        <div>
            <h1 class="text-2xl font-bold tracking-tight">ET-Rechner <span class="text-brand-600">Pro</span></h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold">Engineering Suite</p>
        </div>
    </div>
    
    <button onclick="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-110 transition">
        <span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span>
    </button>
</header>

<main class="max-w-6xl mx-auto p-6">
    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">

        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 p-6 flex flex-col justify-between hover:border-brand-600 transition-colors duration-500">
            
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold">Ohmsches Gesetz</h2>
                    <span class="text-xs font-bold px-2 py-1 bg-brand-100 text-brand-700 dark:bg-brand-900/30 dark:text-brand-400 rounded-full">Basis</span>
                </div>

                <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Berechnungs-Modus</label>
                <select id="mode" onchange="render()" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-brand-600 outline-none transition mb-6">
                    <option value="UI">Gegeben: U & I (R, P gesucht)</option>
                    <option value="UR">Gegeben: U & R (I, P gesucht)</option>
                    <option value="IR">Gegeben: I & R (U, P gesucht)</option>
                </select>

                <div id="inputs" class="space-y-4">
                    </div>

                <div class="mt-8 p-4 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800">
                    <span class="text-xs font-bold text-brand-600 dark:text-brand-400 uppercase block mb-1">Ergebnis</span>
                    <div id="result" class="text-xl font-mono font-bold text-slate-800 dark:text-white">—</div>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 font-mono">
                <p class="uppercase font-bold mb-2">Historie</p>
                <div id="history" class="space-y-1"></div>
            </div>

            <div class="mt-6">
                <p class="text-[13px] text-slate-500 leading-relaxed border-l-2 border-brand-600 pl-3">
                    Das <strong>Ohmsche Gesetz</strong> definiert das Verhältnis von Spannung (U), Strom (I) und Widerstand (R). Ideal zur schnellen Dimensionierung von Schaltungen.
                </p>
            </div>
        </div>

        <div class="bg-slate-200/50 dark:bg-slate-800/50 rounded-3xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center p-12 text-center">
            <p class="text-slate-400 text-sm font-medium">Weitere Rechner (Leistung, Kondensator, Spule) folgen in Kürze...</p>
        </div>

    </div>
</main>

<script>
let historyArr = [];

function toggleDark(){
    document.documentElement.classList.toggle("dark");
}

function convert(v, u){
    if(isNaN(v)) return NaN;
    const factors = { 'µ': 1e-6, 'm': 1e-3, 'k': 1e3, 'M': 1e6 };
    return factors[u] ? v * factors[u] : v;
}

function field(id, label, icon){
    return `
    <div class="relative group">
        <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1 block">${label}</label>
        <div class="flex space-x-2">
            <div class="relative flex-grow">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-600 transition-colors">${icon}</span>
                <input id="${id}" type="number" step="any" placeholder="0.00" oninput="calc()" 
                    class="w-full pl-9 pr-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-brand-600 outline-none transition font-mono">
            </div>
            <select id="${id}_u" onchange="calc()" class="w-20 p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-xs font-bold outline-none">
                <option value="">Units</option>
                <option value="µ">µ</option>
                <option value="m">m</option>
                <option value="k">k</option>
                <option value="M">M</option>
            </select>
        </div>
    </div>`;
}

function getVal(id){
    const val = parseFloat(document.getElementById(id).value);
    const unit = document.getElementById(id+"_u").value;
    return convert(val, unit);
}

function render(){
    let m = document.getElementById("mode").value;
    let h = "";
    if(m==="UI"){
        h += field("u","Spannung U (V)","🔌");
        h += field("i","Strom I (A)","🚀");
    } else if(m==="UR"){
        h += field("u","Spannung U (V)","🔌");
        h += field("r","Widerstand R (Ω)","🚧");
    } else if(m==="IR"){
        h += field("i","Strom I (A)","🚀");
        h += field("r","Widerstand R (Ω)","🚧");
    }
    document.getElementById("inputs").innerHTML = h;
    document.getElementById("result").innerText = "—";
}

function saveHistory(text){
    if(historyArr[0] === text) return;
    historyArr.unshift(text);
    historyArr = historyArr.slice(0, 3);
    localStorage.setItem("et_hist", JSON.stringify(historyArr));
    showHistory();
}

function showHistory(){
    let h = JSON.parse(localStorage.getItem("et_hist") || "[]");
    document.getElementById("history").innerHTML = h.map(item => `<div>• ${item}</div>`).join("");
}

function calc(){
    let m = document.getElementById("mode").value;
    let res = "";
    try {
        if(m==="UI"){
            let u=getVal("u"), i=getVal("i");
            if(u && i) res = `R = ${(u/i).toFixed(3)} Ω | P = ${(u*i).toFixed(3)} W`;
        } else if(m==="UR"){
            let u=getVal("u"), r=getVal("r");
            if(u && r) { let i=u/r; res = `I = ${i.toFixed(3)} A | P = ${(u*i).toFixed(3)} W`; }
        } else if(m==="IR"){
            let i=getVal("i"), r=getVal("r");
            if(i && r) { let u=i*r; res = `U = ${u.toFixed(3)} V | P = ${(u*i).toFixed(3)} W`; }
        }
        
        if(res){
            document.getElementById("result").innerText = res;
            saveHistory(res);
        }
    } catch(e) {}
}

render();
showHistory();
</script>
</body>
</html>
