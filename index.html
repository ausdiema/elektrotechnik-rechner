<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Elektrotechnik Rechner Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  background: #f5f5f7;
}

header {
  text-align: center;
  padding: 50px 20px;
}

header h1 {
  font-size: 36px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1100px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

h3 {
  margin-top: 0;
}

label {
  margin-top: 10px;
  display: block;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  font-weight: bold;
  white-space: pre-line;
}
</style>
</head>

<body>

<header>
  <h1>⚡ Elektrotechnik Rechner</h1>
</header>

<div class="grid">

<!-- OHM -->
<div class="card">
<h3>Ohm Gesetz</h3>

<select id="mode1" onchange="renderOhm()">
  <option value="UI">U & I</option>
  <option value="UR">U & R</option>
  <option value="IR">I & R</option>
</select>

<div id="ohmInputs"></div>

<button onclick="calcOhm()">Berechnen</button>
<div class="result" id="ohmOut"></div>
</div>

<!-- LEISTUNG -->
<div class="card">
<h3>Leistung</h3>

<select id="mode2" onchange="renderPower()">
  <option value="UI">U & I</option>
  <option value="PU">P & U</option>
  <option value="PI">P & I</option>
</select>

<div id="powerInputs"></div>

<button onclick="calcPower()">Berechnen</button>
<div class="result" id="powerOut"></div>
</div>

<!-- ENERGIE -->
<div class="card">
<h3>Energie</h3>

<select id="mode3" onchange="renderEnergy()">
  <option value="PT">P & t</option>
  <option value="EP">E & P</option>
</select>

<div id="energyInputs"></div>

<button onclick="calcEnergy()">Berechnen</button>
<div class="result" id="energyOut"></div>
</div>

</div>

<script>

// Präfix
function conv(val, p) {
  if (isNaN(val)) return NaN;
  if (p === "m") return val * 0.001;
  if (p === "k") return val * 1000;
  if (p === "M") return val * 1000000;
  return val;
}

function field(id, label, unit) {
  return `
  <label>${label}</label>
  <input id="${id}" type="number">
  <select id="${id}_p">
    <option value="">${unit}</option>
    <option value="m">m${unit}</option>
    <option value="k">k${unit}</option>
    <option value="M">M${unit}</option>
  </select>`;
}

function get(id){
  return conv(
    parseFloat(document.getElementById(id).value),
    document.getElementById(id+"_p").value
  );
}

//////////////// OHM //////////////////
function renderOhm(){
  let m = document.getElementById("mode1").value;
  let h="";
  if(m==="UI"){ h+=field("u1","U","V")+field("i1","I","A"); }
  if(m==="UR"){ h+=field("u1","U","V")+field("r1","R","Ω"); }
  if(m==="IR"){ h+=field("i1","I","A")+field("r1","R","Ω"); }
  document.getElementById("ohmInputs").innerHTML=h;
}

function calcOhm(){
  let m = document.getElementById("mode1").value;
  let o="";
  if(m==="UI"){
    let u=get("u1"), i=get("i1");
    o+="R="+(u/i).toFixed(4)+" Ω\nP="+(u*i).toFixed(4)+" W";
  }
  if(m==="UR"){
    let u=get("u1"), r=get("r1");
    let i=u/r;
    o+="I="+i.toFixed(4)+" A\nP="+(u*i).toFixed(4)+" W";
  }
  if(m==="IR"){
    let i=get("i1"), r=get("r1");
    let u=r*i;
    o+="U="+u.toFixed(4)+" V\nP="+(u*i).toFixed(4)+" W";
  }
  document.getElementById("ohmOut").innerText=o;
}

//////////////// POWER //////////////////
function renderPower(){
  let m=document.getElementById("mode2").value;
  let h="";
  if(m==="UI"){ h+=field("u2","U","V")+field("i2","I","A"); }
  if(m==="PU"){ h+=field("p2","P","W")+field("u2","U","V"); }
  if(m==="PI"){ h+=field("p2","P","W")+field("i2","I","A"); }
  document.getElementById("powerInputs").innerHTML=h;
}

function calcPower(){
  let m=document.getElementById("mode2").value;
  let o="";
  if(m==="UI"){
    let u=get("u2"), i=get("i2");
    o+="P="+(u*i).toFixed(4)+" W";
  }
  if(m==="PU"){
    let p=get("p2"), u=get("u2");
    o+="I="+(p/u).toFixed(4)+" A";
  }
  if(m==="PI"){
    let p=get("p2"), i=get("i2");
    o+="U="+(p/i).toFixed(4)+" V";
  }
  document.getElementById("powerOut").innerText=o;
}

//////////////// ENERGY //////////////////
function renderEnergy(){
  let m=document.getElementById("mode3").value;
  let h="";
  if(m==="PT"){ h+=field("p3","P","W")+field("t3","t","s"); }
  if(m==="EP"){ h+=field("e3","E","J")+field("p3","P","W"); }
  document.getElementById("energyInputs").innerHTML=h;
}

function calcEnergy(){
  let m=document.getElementById("mode3").value;
  let o="";
  if(m==="PT"){
    let p=get("p3"), t=get("t3");
    o+="E="+(p*t).toFixed(4)+" J";
  }
  if(m==="EP"){
    let e=get("e3"), p=get("p3");
    o+="t="+(e/p).toFixed(4)+" s";
  }
  document.getElementById("energyOut").innerText=o;
}

renderOhm();
renderPower();
renderEnergy();

</script>

</body>
</html>
