<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <title>EngiCalc Pro – The Engineering Suite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { 50: '#f0f7ff', 600: '#2563eb', 900: '#1e3a8a' } } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .glow-result { text-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Dashboard Transitions */
        .view-transition { transition: all 0.3s ease-in-out; }
        .hidden-view { display: none; opacity: 0; transform: translateY(10px); }
        .active-view { display: block; opacity: 1; transform: translateY(0); }
        
        #sidebar { display: none; position: fixed; right: 0; top: 0; height: 100%; width: 100%; z-index: 100; }
        @media (min-width: 768px) { #sidebar { width: 320px; } }
        #sidebar.open { display: block; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

<div id="sidebar" class="bg-white dark:bg-slate-900 shadow-2xl p-6 border-l dark:border-slate-800">
    <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold uppercase text-xs tracking-widest text-brand-600">Calculation History</h3>
        <button onclick="toggleSidebar()" class="text-slate-400 hover:text-red-500 text-2xl">✕</button>
    </div>
    <div id="history-list" class="space-y-3 overflow-y-auto max-h-[85vh] text-[11px] font-mono"></div>
</div>

<header class="max-w-6xl mx-auto p-6 flex justify-between items-center">
    <div class="flex items-center space-x-2 cursor-pointer" onclick="showDashboard()">
        <div class="bg-brand-600 p-2 rounded-lg shadow-lg"><span class="text-white text-2xl">⚡</span></div>
        <h1 class="text-2xl font-bold tracking-tight uppercase italic">EngiCalc <span class="text-brand-600">Pro</span></h1>
    </div>
    <div class="flex space-x-2">
        <button onclick="toggleSidebar()" class="px-4 py-2 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:text-brand-600 transition text-xs font-bold uppercase tracking-wider">📜 History</button>
        <button onclick="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 transition text-xl">🌙</button>
    </div>
</header>

<div id="dashboard" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 active-view">
    <div onclick="openCalc('calc-ohm')" class="group bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 hover:border-brand-600 transition-all cursor-pointer hover:shadow-xl hover:-translate-y-1">
        <span class="text-3xl mb-4 block">🔌</span>
        <h2 class="text-xl font-bold mb-1">Ohm's Law</h2>
        <p class="text-slate-400 text-xs font-mono uppercase">V = R × I</p>
    </div>

    <div onclick="openCalc('calc-div')" class="group bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 hover:border-brand-600 transition-all cursor-pointer hover:shadow-xl hover:-translate-y-1">
        <span class="text-3xl mb-4 block">📏</span>
        <h2 class="text-xl font-bold mb-1">Voltage Divider</h2>
        <p class="text-slate-400 text-xs font-mono uppercase">Vout = Vin × (R2/Rtotal)</p>
    </div>

    <div onclick="openCalc('calc-vd')" class="group bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 hover:border-brand-600 transition-all cursor-pointer hover:shadow-xl hover:-translate-y-1">
        <span class="text-3xl mb-4 block">📉</span>
        <h2 class="text-xl font-bold mb-1">Voltage Drop</h2>
        <p class="text-slate-400 text-xs font-mono uppercase">ΔV = (2·L·I) / (κ·A)</p>
    </div>
</div>

<div id="calc-container" class="max-w-4xl mx-auto p-6 hidden-view">
    <button onclick="showDashboard()" class="mb-6 text-sm font-bold text-slate-400 hover:text-brand-600 transition flex items-center">
        ← BACK TO DASHBOARD
    </button>

    <div id="calc-ohm" class="calc-view hidden-view">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-8 border border-slate-100 dark:border-slate-800">
            <h2 class="text-3xl font-bold text-brand-600 mb-6">Ohm's Law</h2>
            <select id="ohm_m" onchange="renderOhm()" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-bold mb-8">
                <option value="UI">Solve for R & P (Given V, I)</option>
                <option value="UR">Solve for I & P (Given V, R)</option>
                <option value="IR">Solve for V & P (Given I, R)</option>
            </select>
            <div id="ohm-inputs" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8"></div>
            <div id="ohm-res" class="p-6 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800 text-2xl font-mono font-bold glow-result text-center">—</div>
        </div>
    </div>

    <div id="calc-div" class="calc-view hidden-view">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-8 border border-slate-100 dark:border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-brand-600">Voltage Divider</h2>
                <select id="div_mode" onchange="updateDivUI()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-xs font-bold uppercase">
                    <option value="unloaded">Unloaded</option>
                    <option value="loaded">Loaded</option>
                </select>
            </div>
            <div id="div-inputs-wrapper" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div id="f_vin"></div><div id="f_r1"></div><div id="f_r2"></div><div id="f_rl" class="hidden"></div>
            </div>
            <div id="div-res" class="p-6 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800 text-2xl font-mono font-bold glow-result text-center">—</div>
        </div>
    </div>

    <div id="calc-vd" class="calc-view hidden-view">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-8 border border-slate-100 dark:border-slate-800">
            <h2 class="text-3xl font-bold text-brand-600 mb-6">Voltage Drop</h2>
            <div id="vd-inputs" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8"></div>
            <div class="mb-8">
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">Material Conductivity (κ)</label>
                <select id="vd_kappa" onchange="calcVD()" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-bold">
                    <option value="56">Copper (κ=56)</option>
                    <option value="35">Aluminum (κ=35)</option>
                </select>
            </div>
            <div id="vd-res" class="p-6 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800 text-2xl font-mono font-bold glow-result text-center">—</div>
        </div>
    </div>
</div>

<script>
// --- NAVIGATION LOGIC ---
function openCalc(id) {
    document.getElementById('dashboard').classList.remove('active-view');
    document.getElementById('dashboard').classList.add('hidden-view');
    
    document.getElementById('calc-container').classList.remove('hidden-view');
    document.getElementById('calc-container').classList.add('active-view');
    
    document.querySelectorAll('.calc-view').forEach(v => v.classList.add('hidden-view'));
    document.getElementById(id).classList.remove('hidden-view');
    document.getElementById(id).classList.add('active-view');
}

function showDashboard() {
    document.getElementById('calc-container').classList.add('hidden-view');
    document.getElementById('calc-container').classList.remove('active-view');
    
    document.getElementById('dashboard').classList.add('active-view');
    document.getElementById('dashboard').classList.remove('hidden-view');
}

// --- UTILITIES ---
function toggleDark() { document.documentElement.classList.toggle('dark'); }
function toggleSidebar() { 
    const s = document.getElementById('sidebar');
    s.classList.toggle('open');
    if(s.classList.contains('open')) renderHistory();
}

function formatValue(val, unit) {
    if (val === 0) return "0 " + unit;
    if (Math.abs(val) < 0.001) return val.toExponential(2) + " " + unit;
    return val.toLocaleString(undefined, {maximumFractionDigits: 4}) + " " + unit;
}

function convert(v, u) { 
    const f = { 'm':1e-3, 'k':1e3, 'M':1e6 };
    return f[u] ? v * f[u] : v; 
}

function field(id, label, icon, fn) {
    return `<div>
        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">${label}</label>
        <div class="flex space-x-2">
            <div class="relative flex-grow">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">${icon}</span>
                <input id="${id}" type="number" step="any" oninput="${fn}" class="w-full pl-9 pr-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 outline-none text-sm font-mono focus:ring-2 focus:ring-brand-600 transition">
            </div>
            <select id="${id}_u" onchange="${fn}" class="w-20 p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-xs font-bold outline-none border-none">
                <option value="">Base</option>
                <option value="m">milli</option>
                <option value="k">kilo</option>
                <option value="M">Mega</option>
            </select>
        </div>
    </div>`;
}

function getVal(id) { 
    const el = document.getElementById(id);
    if(!el || !el.value) return 0;
    return convert(parseFloat(el.value), document.getElementById(id+"_u").value); 
}

// --- LOGIC (REUSED FROM YOUR CODE) ---
function renderOhm() {
    let m = document.getElementById("ohm_m").value, h = "";
    if(m==="UI") { h+=field("o_u","Voltage (V)","🔌","calcOhm()"); h+=field("o_i","Current (I)","🚀","calcOhm()"); }
    else if(m==="UR") { h+=field("o_u","Voltage (V)","🔌","calcOhm()"); h+=field("o_r","Resistance (Ω)","🚧","calcOhm()"); }
    else if(m==="IR") { h+=field("o_i","Current (I)","🚀","calcOhm()"); h+=field("o_r","Resistance (Ω)","🚧","calcOhm()"); }
    document.getElementById("ohm-inputs").innerHTML = h;
}

function calcOhm() {
    let m = document.getElementById("ohm_m").value, u=getVal("o_u"), i=getVal("o_i"), r=getVal("o_r");
    let res = "";
    if(m==="UI" && u && i) res=`R: ${formatValue(u/i, 'Ω')} | P: ${formatValue(u*i, 'W')}`;
    else if(m==="UR" && u && r) res=`I: ${formatValue(u/r, 'A')} | P: ${formatValue(u**2/r, 'W')}`;
    else if(m==="IR" && i && r) res=`V: ${formatValue(i*r, 'V')} | P: ${formatValue(i**2*r, 'W')}`;
    if(res) { document.getElementById("ohm-res").innerText = res; saveToHistory("Ohm's: " + res); }
}

function calcDiv() {
    let vin = getVal("v_in"), r1 = getVal("v_r1"), r2 = getVal("v_r2"), rl = getVal("v_rl");
    let isLoaded = document.getElementById('div_mode').value === 'loaded';
    if(vin && r1 && r2) {
        let vout = isLoaded && rl ? vin * (((r2*rl)/(r2+rl)) / (r1 + ((r2*rl)/(r2+rl)))) : vin * (r2 / (r1 + r2));
        document.getElementById('div-res').innerText = formatValue(vout, 'V');
        saveToHistory(`Divider: ${formatValue(vout, 'V')}`);
    }
}

function updateDivUI() {
    const isL = document.getElementById('div_mode').value === 'loaded';
    document.getElementById('f_rl').classList.toggle('hidden', !isL);
    calcDiv();
}

function calcVD() {
    let i=getVal("vd_i"), l=getVal("vd_l"), a=getVal("vd_a"), k=parseFloat(document.getElementById("vd_kappa").value);
    if(i && l && a) { 
        let v = (2*l*i)/(k*a);
        document.getElementById("vd-res").innerText = "ΔV: " + formatValue(v, 'V');
        saveToHistory(`VDrop: ${formatValue(v, 'V')}`);
    }
}

function saveToHistory(t) {
    let h = JSON.parse(localStorage.getItem('engiHistory') || '[]');
    if(h.length > 0 && h[0].text === t) return;
    h.unshift({ time: new Date().toLocaleTimeString(), text: t });
    localStorage.setItem('engiHistory', JSON.stringify(h.slice(0,15)));
}

function renderHistory() {
    const h = JSON.parse(localStorage.getItem('engiHistory') || '[]');
    document.getElementById('history-list').innerHTML = h.map(i => `<div class="p-3 border-b dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/30 rounded-lg mb-2"><span class="text-brand-600 font-bold text-[9px] uppercase">${i.time}</span><br><span class="text-slate-700 dark:text-slate-300">${i.text}</span></div>`).join('') || '<p class="opacity-50 italic text-center py-4">No records.</p>';
}

// INIT
document.getElementById('f_vin').innerHTML = field("v_in", "Supply (Vin)", "🔋", "calcDiv()");
document.getElementById('f_r1').innerHTML = field("v_r1", "Resistor R1", "🚧", "calcDiv()");
document.getElementById('f_r2').innerHTML = field("v_r2", "Resistor R2", "🚧", "calcDiv()");
document.getElementById('f_rl').innerHTML = field("v_rl", "Load RL", "🎯", "calcDiv()");
document.getElementById("vd-inputs").innerHTML = field("vd_i","Current (I)","🚀","calcVD()") + field("vd_l","Length (m)","📏","calcVD()") + field("vd_a","Cross-section (A)","⬛","calcVD()");
renderOhm();
</script>
</body>
</html>
