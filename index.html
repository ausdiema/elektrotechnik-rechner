<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <title>Engineering Suite Pro – Electrical Tools</title>
    <meta name="description" content="Professional electrical engineering calculators. Ohm's Law, Voltage Drop, and Power tools with modern UI for engineers and students.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            600: '#2563eb', 
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

<header class="max-w-6xl mx-auto p-6 flex justify-between items-center">
    <div class="flex items-center space-x-2">
        <div class="bg-brand-600 p-2 rounded-lg shadow-lg">
            <span class="text-white text-2xl">⚡</span>
        </div>
        <div>
            <h1 class="text-2xl font-bold tracking-tight">Engi<span class="text-brand-600">Calc</span> Pro</h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold">Global Engineering Suite</p>
        </div>
    </div>
    
    <button onclick="toggleDark()" class="p-2 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-110 transition">
        <span class="dark:hidden">🌙</span><span class="hidden dark:block">☀️</span>
    </button>
</header>

<main class="max-w-6xl mx-auto p-6">
    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">

        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 flex flex-col hover:border-brand-600 hover:-translate-y-1 transition-all duration-300">
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold">Ohm's Law</h2>
                    <span class="text-[10px] font-bold px-2 py-1 bg-brand-100 text-brand-700 dark:bg-brand-900/30 dark:text-brand-400 rounded-full uppercase">Basic</span>
                </div>

                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Calculation Mode</label>
                <select id="mode" onchange="renderOhm()" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-brand-600 outline-none transition mb-6 text-sm">
                    <option value="UI">Given: U & I (Find R, P)</option>
                    <option value="UR">Given: U & R (Find I, P)</option>
                    <option value="IR">Given: I & R (Find U, P)</option>
                </select>

                <div id="ohm-inputs" class="space-y-4"></div>

                <div class="mt-8 p-4 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800 relative">
                    <span class="text-[10px] font-bold text-brand-600 dark:text-brand-400 uppercase block mb-1">Result</span>
                    <div id="ohm-result" class="text-lg font-mono font-bold text-slate-800 dark:text-white truncate pr-10">—</div>
                    <button onclick="copyToClipboard('ohm-result')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-600 transition">📋</button>
                </div>
            </div>

            <button onclick="toggleFormula('ohm-formula')" class="mt-4 text-[10px] font-bold text-slate-400 uppercase hover:text-brand-600 transition flex items-center">
                <span>View Formula</span> <span class="ml-1">↓</span>
            </button>
            <div id="ohm-formula" class="hidden mt-2 p-2 bg-slate-50 dark:bg-slate-800 rounded-lg text-[10px] font-mono text-slate-500">
                U = R × I | P = U × I
            </div>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 flex flex-col hover:border-brand-600 hover:-translate-y-1 transition-all duration-300">
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold">Voltage Drop</h2>
                    <span class="text-[10px] font-bold px-2 py-1 bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 rounded-full uppercase">Cable Sizing</span>
                </div>

                <div class="space-y-4">
                    <div id="vd-inputs">
                        </div>
                </div>

                <div class="mt-8 p-4 bg-brand-50 dark:bg-brand-900/20 rounded-2xl border border-brand-100 dark:border-brand-800 relative">
                    <span class="text-[10px] font-bold text-brand-600 dark:text-brand-400 uppercase block mb-1">Result (ΔU)</span>
                    <div id="vd-result" class="text-lg font-mono font-bold text-slate-800 dark:text-white">—</div>
                    <button onclick="copyToClipboard('vd-result')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-brand-600 transition">📋</button>
                </div>
            </div>

            <button onclick="toggleFormula('vd-formula')" class="mt-4 text-[10px] font-bold text-slate-400 uppercase hover:text-brand-600 transition flex items-center">
                <span>View Formula</span> <span class="ml-1">↓</span>
            </button>
            <div id="vd-formula" class="hidden mt-2 p-2 bg-slate-50 dark:bg-slate-800 rounded-lg text-[10px] font-mono text-slate-500">
                ΔU = (2 × L × I) / (κ × A)
            </div>
        </div>

        <div class="bg-slate-200/50 dark:bg-slate-800/50 rounded-3xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center p-12 text-center">
            <p class="text-slate-400 text-sm font-medium">Coming Soon:<br>Three-Phase Power & AC Tools</p>
        </div>

    </div>
</main>

<script>
const toggleDark = () => document.documentElement.classList.toggle("dark");
const toggleFormula = (id) => document.getElementById(id).classList.toggle("hidden");

function copyToClipboard(id) {
    const text = document.getElementById(id).innerText;
    if (text === "—") return;
    navigator.clipboard.writeText(text);
    alert("Result copied to clipboard!");
}

function field(id, label, icon, calcFn) {
    return `
    <div class="relative group">
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">${label}</label>
        <div class="flex space-x-2">
            <div class="relative flex-grow">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-600 transition-colors">${icon}</span>
                <input id="${id}" type="number" step="any" placeholder="0.00" oninput="${calcFn}" 
                    class="w-full pl-9 pr-3 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-brand-600 outline-none transition text-sm font-mono">
            </div>
            <select id="${id}_u" onchange="${calcFn}" class="w-16 p-2 rounded-xl bg-slate-100 dark:bg-slate-700 text-[10px] font-bold outline-none">
                <option value="">Unit</option>
                <option value="m">m</option><option value="k">k</option><option value="M">M</option>
            </select>
        </div>
    </div>`;
}

function getVal(id) {
    const v = parseFloat(document.getElementById(id).value);
    const u = document.getElementById(id+"_u").value;
    if (isNaN(v)) return 0;
    const factors = { 'm': 1e-3, 'k': 1e3, 'M': 1e6 };
    return factors[u] ? v * factors[u] : v;
}

// OHM CALCULATION
function renderOhm() {
    let m = document.getElementById("mode").value;
    let h = "";
    if(m==="UI") { h += field("o_u","Voltage (V)","🔌","calcOhm()"); h += field("o_i","Current (I)","🚀","calcOhm()"); }
    else if(m==="UR") { h += field("o_u","Voltage (V)","🔌","calcOhm()"); h += field("o_r","Resistance (Ω)","🚧","calcOhm()"); }
    else if(m==="IR") { h += field("o_i","Current (I)","🚀","calcOhm()"); h += field("o_r","Resistance (Ω)","🚧","calcOhm()"); }
    document.getElementById("ohm-inputs").innerHTML = h;
}

function calcOhm() {
    let m = document.getElementById("mode").value;
    let res = "—";
    if(m==="UI") { let u=getVal("o_u"), i=getVal("o_i"); if(u&&i) res=`R: ${(u/i).toFixed(2)}Ω | P: ${(u*i).toFixed(2)}W`; }
    else if(m==="UR") { let u=getVal("o_u"), r=getVal("o_r"); if(u&&r) res=`I: ${(u/r).toFixed(2)}A | P: ${(u*(u/r)).toFixed(2)}W`; }
    else if(m==="IR") { let i=getVal("o_i"), r=getVal("o_r"); if(i&&r) res=`U: ${(i*r).toFixed(2)}V | P: ${(i*i*r).toFixed(2)}W`; }
    document.getElementById("ohm-result").innerText = res;
}

// VOLTAGE DROP CALCULATION
function renderVD() {
    let h = field("vd_i","Current (A)","🚀","calcVD()");
    h += field("vd_l","Length (m)","📏","calcVD()");
    h += field("vd_a","Cross-section (mm²)","⬛","calcVD()");
    h += `<div class="relative group">
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">Conductivity (κ - Copper=56)</label>
            <input id="vd_k" type="number" value="56" oninput="calcVD()" class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-brand-600 outline-none transition text-sm font-mono">
          </div>`;
    document.getElementById("vd-inputs").innerHTML = h;
}

function calcVD() {
    let i=getVal("vd_i"), l=getVal("vd_l"), a=getVal("vd_a"), k=parseFloat(document.getElementById("vd_k").value);
    if(i && l && a && k) {
        let dv = (2 * l * i) / (k * a);
        document.getElementById("vd-result").innerText = `ΔU: ${dv.toFixed(3)} V`;
    } else {
        document.getElementById("vd-result").innerText = "—";
    }
}

renderOhm();
renderVD();
</script>
</body>
</html>
