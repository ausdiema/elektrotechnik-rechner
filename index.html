<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>EngiCalc Pro – Elektrotechnik Rechner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { mono: ['JetBrains Mono', 'monospace'], sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' } } 
                } 
            }
        }
    </script>
    <style>
        .hidden-view { display: none !important; }
        .formula-box { 
            background: rgba(37, 99, 235, 0.05); 
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 1.5rem;
            min-height: 140px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
        }
        .dark .formula-box { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.1); }
        .searching-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen font-sans transition-colors duration-300">

<header class="max-w-7xl mx-auto p-6 md:p-10 flex justify-between items-center">
    <div class="flex items-center space-x-3 cursor-pointer" onclick="showDashboard()">
        <div class="w-12 h-12 bg-brand-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-600/30 font-bold text-xl">Ω</div>
        <h1 class="text-2xl font-bold tracking-tighter uppercase">EngiCalc <span class="text-brand-600">Pro</span></h1>
    </div>
    <div class="flex items-center space-x-4">
        <button onclick="toggleDark()" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center hover:scale-110 transition-transform shadow-sm">🌓</button>
    </div>
</header>

<main id="dashboard" class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div onclick="openCalc('ohm')" class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 hover:border-brand-600 cursor-pointer shadow-sm hover:shadow-xl transition-all group">
        <div class="text-brand-600 mb-4 font-bold">Ohm'sches Gesetz</div>
        <h2 class="text-xl font-bold">U, R, I Berechnung</h2>
        <p class="text-sm text-slate-500 mt-2">Berechne Spannung, Widerstand oder Stromstärke.</p>
    </div>
    <div onclick="openCalc('power')" class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 hover:border-brand-600 cursor-pointer shadow-sm hover:shadow-xl transition-all group">
        <div class="text-brand-600 mb-4 font-bold">Elektrische Leistung</div>
        <h2 class="text-xl font-bold">P, U, I Berechnung</h2>
        <p class="text-sm text-slate-500 mt-2">Bestimme die Leistung in Watt oder zugehörige Werte.</p>
    </div>
</main>

<div id="calc-container" class="max-w-4xl mx-auto p-6 hidden-view">
    <button onclick="showDashboard()" class="mb-8 text-[10px] font-bold text-slate-400 hover:text-brand-600 tracking-[0.3em] uppercase transition-colors">← ZURÜCK ZUR ÜBERSICHT</button>

    <div id="active-formula" class="formula-box mb-10"></div>
    
    <div class="mb-10 bg-white dark:bg-slate-900 p-8 rounded-3xl border dark:border-slate-800 shadow-sm">
        <label class="text-[10px] font-bold text-brand-600 uppercase tracking-[0.2em] block mb-6">Was soll berechnet werden? (Gesucht)</label>
        <div id="target-selector" class="flex flex-wrap gap-3"></div>
    </div>

    <div id="inputs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10"></div>
    
    <div class="text-center p-12 bg-white dark:bg-slate-900 rounded-[2.5rem] border-2 border-brand-600 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-brand-600"></div>
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] block mb-4">Berechnetes Ergebnis</span>
        <div id="result-display" class="text-6xl md:text-7xl font-mono font-bold text-brand-600 drop-shadow-sm">—</div>
    </div>
</div>

<script>
// KONFIGURATION & ÜBERSETZUNGEN
const SI_PRÄFIXE = [
    { p: 'G', e: 9, l: 'G (10⁹)' }, { p: 'M', e: 6, l: 'M (10⁶)' }, { p: 'k', e: 3, l: 'k (10³)' },
    { p: '', e: 0, l: 'Basis (10⁰)' }, { p: 'm', e: -3, l: 'm (10⁻³)' }, { p: 'u', e: -6, l: 'μ (10⁻⁶)' },
    { p: 'n', e: -9, l: 'n (10⁻⁹)' }
];

const MODULE = {
    ohm: {
        titel: "Ohm'sches Gesetz",
        targets: [
            { id: 'U', label: 'Spannung (U)', unit: 'V', formula: 'U = R \\cdot I' },
            { id: 'R', label: 'Widerstand (R)', unit: 'Ω', formula: 'R = \\frac{U}{I}' },
            { id: 'I', label: 'Stromstärke (I)', unit: 'A', formula: 'I = \\frac{U}{R}' }
        ],
        calc: (t, v) => {
            if(t==='U') return v.R * v.I;
            if(t==='R') return v.U / v.I;
            if(t==='I') return v.U / v.R;
        }
    },
    power: {
        titel: "Elektrische Leistung",
        targets: [
            { id: 'P', label: 'Leistung (P)', unit: 'W', formula: 'P = U \\cdot I' },
            { id: 'U', label: 'Spannung (U)', unit: 'V', formula: 'U = \\frac{P}{I}' },
            { id: 'I', label: 'Stromstärke (I)', unit: 'A', formula: 'I = \\frac{P}{U}' }
        ],
        calc: (t, v) => {
            if(t==='P') return v.U * v.I;
            if(t==='U') return v.P / v.I;
            if(t==='I') return v.P / v.U;
        }
    }
};

let aktuellesModul = '';
let aktuellesZiel = '';

// FORMEL RENDERING
function updateFormula(tex) {
    const el = document.getElementById('active-formula');
    try {
        katex.render(tex, el, { throwOnError: false, displayMode: true });
    } catch (err) {
        el.innerHTML = tex;
    }
}

// UI GENERIERUNG
function renderInputs() {
    const mod = MODULE[aktuellesModul];
    const zielObj = mod.targets.find(t => t.id === aktuellesZiel);
    const grid = document.getElementById('inputs-grid');
    grid.innerHTML = '';

    mod.targets.forEach(t => {
        if(t.id === aktuellesZiel) {
            // Ziel-Box (Kein Input)
            grid.innerHTML += `
                <div class="p-8 rounded-3xl border-2 border-dashed border-brand-500/30 bg-brand-500/5 flex flex-col items-center justify-center space-y-2">
                    <span class="text-[10px] font-bold text-brand-600 uppercase tracking-widest searching-pulse">Zielvariable</span>
                    <span class="text-2xl font-bold text-slate-800 dark:text-slate-200">${t.label}</span>
                </div>`;
        } else {
            // Eingabefeld
            grid.innerHTML += `
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block ml-1">${t.label}</label>
                    <div class="flex shadow-sm rounded-2xl overflow-hidden ring-1 ring-slate-200 dark:ring-slate-800 focus-within:ring-2 focus-within:ring-brand-600 transition-all">
                        <input id="inp_${t.id}" type="number" step="any" oninput="berechne()" placeholder="0,00" class="flex-grow p-5 bg-white dark:bg-slate-900 outline-none font-mono text-xl w-full">
                        <select id="unit_${t.id}" onchange="berechne()" class="w-32 bg-slate-100 dark:bg-slate-800 border-none text-[11px] font-bold px-3 outline-none cursor-pointer">
                            ${SI_PRÄFIXE.map(s => `<option value="${s.e}" ${s.e===0?'selected':''}>${s.l}</option>`).join('')}
                        </select>
                    </div>
                </div>`;
        }
    });
    updateFormula(zielObj.formula);
    berechne();
}

// HAUPT-LOGIK
function berechne() {
    const mod = MODULE[aktuellesModul];
    const werte = {};
    
    mod.targets.forEach(t => {
        if(t.id !== aktuellesZiel) {
            const val = parseFloat(document.getElementById(`inp_${t.id}`).value);
            const exp = parseFloat(document.getElementById(`unit_${t.id}`).value);
            if(!isNaN(val)) werte[t.id] = val * Math.pow(10, exp);
        }
    });

    const zielObj = mod.targets.find(t => t.id === aktuellesZiel);
    const ergebnis = mod.calc(aktuellesZiel, werte);
    
    const display = document.getElementById('result-display');
    if(ergebnis !== undefined && !isNaN(ergebnis) && isFinite(ergebnis)) {
        display.innerText = formatErgebnis(ergebnis, zielObj.unit);
    } else {
        display.innerText = "—";
    }
}

function formatErgebnis(val, einheit) {
    const abs = Math.abs(val);
    if(abs === 0) return "0 " + einheit;
    
    // Automatische Wahl des besten Präfixes
    let präfix = SI_PRÄFIXE.find(s => abs >= Math.pow(10, s.e)) || SI_PRÄFIXE[SI_PRÄFIXE.length-1];
    let formatiert = (val / Math.pow(10, präfix.e)).toLocaleString('de-DE', { 
        maximumFractionDigits: 3, 
        minimumFractionDigits: 0 
    });
    
    return `${formatiert} ${präfix.p}${einheit}`;
}

// NAVIGATION
function openCalc(id) {
    aktuellesModul = id;
    document.getElementById('dashboard').classList.add('hidden-view');
    document.getElementById('calc-container').classList.remove('hidden-view');
    
    const mod = MODULE[id];
    const selector = document.getElementById('target-selector');
    selector.innerHTML = mod.targets.map(t => `
        <button onclick="setTarget('${t.id}')" id="btn_${t.id}" class="target-btn px-6 py-4 rounded-2xl font-bold text-xs transition-all border-2 border-transparent">
            ${t.label}
        </button>`).join('');
    
    setTarget(mod.targets[0].id);
}

function setTarget(id) {
    aktuellesZiel = id;
    document.querySelectorAll('.target-btn').forEach(b => {
        b.classList.remove('bg-brand-600', 'text-white', 'shadow-lg');
        b.classList.add('bg-slate-100', 'dark:bg-slate-800', 'text-slate-500');
    });
    const activeBtn = document.getElementById(`btn_${id}`);
    activeBtn.classList.add('bg-brand-600', 'text-white', 'shadow-lg');
    activeBtn.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'text-slate-500');
    
    renderInputs();
}

function showDashboard() {
    document.getElementById('calc-container').classList.add('hidden-view');
    document.getElementById('dashboard').classList.remove('hidden-view');
}

function toggleDark() { document.documentElement.classList.toggle('dark'); }

// Initialisierung bei Start
document.addEventListener("DOMContentLoaded", () => {
    // KaTeX braucht einen Moment zum Laden der Fonts
    setTimeout(() => {
        if(aktuellesModul) updateFormula(MODULE[aktuellesModul].targets.find(t=>t.id===aktuellesZiel).formula);
    }, 200);
});
</script>
</body>
</html>
